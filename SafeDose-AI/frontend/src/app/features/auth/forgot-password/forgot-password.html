<section class="flex min-h-screen items-center justify-center bg-background p-6">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-right space-y-6">

    <!-- Icon -->
    <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto">
      <lucide-icon [img]="keyIcon" class="w-8 h-8 text-primary"></lucide-icon>
    </div>

    <!-- Header -->
    <div class="text-center space-y-2">
      <h2 class="text-2xl font-extrabold text-on-background">نسيت كلمة المرور؟</h2>
      <p class="text-sm text-outline">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين</p>
    </div>

    <!-- Error -->
    @if (errorText) {
      <div class="p-3.5 bg-danger-container border-r-4 border-danger text-on-danger-container text-xs font-bold rounded-l-xl flex items-start gap-2.5">
        <lucide-icon [img]="alertIcon" class="w-5 h-5 shrink-0 mt-0.5"></lucide-icon>
        <p>{{ errorText }}</p>
      </div>
    }

    @if (!sent) {
      <!-- Email Input -->
      <div class="space-y-1">
        <label class="text-sm font-bold text-on-background block">البريد الإلكتروني</label>
        <input
          [(ngModel)]="email"
          type="email"
          placeholder="example@email.com"
          dir="ltr"
          class="w-full h-12 px-4 bg-white border border-outline-variant rounded-xl focus:border-primary focus:ring-2 focus:ring-primary/10 outline-none text-sm font-medium transition-all text-left"
        />
      </div>

      <!-- Submit -->
      <button
        (click)="send()"
        [disabled]="loading || !email.trim()"
        class="w-full h-14 bg-primary hover:bg-primary-dark disabled:bg-slate-200 disabled:text-outline text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-md cursor-pointer"
      >
        @if (loading) {
          <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        } @else {
          <lucide-icon [img]="mailIcon" class="w-5 h-5"></lucide-icon>
          <span>إرسال رابط الاسترداد</span>
        }
      </button>
    }

    <!-- Sent State -->
    @if (sent) {
      <div class="text-center space-y-4 py-2">
        <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto">
          <lucide-icon [img]="mailIcon" class="w-8 h-8 text-emerald-500"></lucide-icon>
        </div>
        <h3 class="text-lg font-extrabold text-on-background">تم الإرسال!</h3>
        <p class="text-sm text-outline leading-relaxed">
          تم إرسال كود إعادة التعيين إلى
          <span class="font-bold text-primary">{{ email }}</span>
          — تحقق من صندوق الوارد أو Spam
        </p>
        <button
          routerLink="/reset-password"
          [queryParams]="{ email: email }"
          class="w-full h-12 bg-primary text-white rounded-2xl font-bold text-sm cursor-pointer hover:bg-primary-dark transition-all"
        >
          أدخل الكود الآن
        </button>
      </div>
    }

    <!-- Back to Login -->
    <div class="text-center">
      <a routerLink="/login" class="text-primary font-bold text-xs hover:underline cursor-pointer">
        ← العودة لتسجيل الدخول
      </a>
    </div>

  </div>
</section>
