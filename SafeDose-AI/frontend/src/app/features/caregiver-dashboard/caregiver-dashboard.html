<div class="space-y-6 max-w-5xl mx-auto pt-16 pb-24">
  <div class="flex items-center justify-between text-right">
    <div class="space-y-1">
      <h2 class="text-2xl font-extrabold text-primary">SafeDose Pro 🧑‍⚕️</h2>
      <p class="text-sm text-outline">بوابة مقدمي الرعاية الطبية</p>
    </div>
    <div class="flex items-center gap-2">
      <button class="p-2 hover:bg-slate-100 rounded-xl">
        <lucide-icon [img]="bellIcon" class="w-5 h-5 text-outline"></lucide-icon>
      </button>
      <button class="p-2 hover:bg-slate-100 rounded-xl">
        <lucide-icon [img]="settingsIcon" class="w-5 h-5 text-outline"></lucide-icon>
      </button>
    </div>
  </div>

  <!-- Stats Row -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-primary/10 rounded-2xl p-4 text-right">
      <lucide-icon [img]="heartIcon" class="w-6 h-6 text-primary mb-2"></lucide-icon>
      <p class="text-2xl font-black text-primary">٢٤</p>
      <p class="text-xs text-outline">إجمالي المرضى</p>
    </div>
    <div class="bg-danger-container rounded-2xl p-4 text-right">
      <lucide-icon [img]="alertTriangleIcon" class="w-6 h-6 text-danger mb-2"></lucide-icon>
      <p class="text-2xl font-black text-danger">٣</p>
      <p class="text-xs text-on-danger-container">حالات عاجلة</p>
    </div>
    <div class="bg-tertiary-container rounded-2xl p-4 text-right">
      <lucide-icon [img]="stethoscopeIcon" class="w-6 h-6 text-tertiary mb-2"></lucide-icon>
      <p class="text-2xl font-black text-tertiary">١٨</p>
      <p class="text-xs text-on-tertiary-container">مستقرون</p>
    </div>
    <div class="bg-secondary-container rounded-2xl p-4 text-right">
      <lucide-icon [img]="checkCircleIcon" class="w-6 h-6 text-on-secondary mb-2"></lucide-icon>
      <p class="text-2xl font-black text-on-secondary">٨٧٪</p>
      <p class="text-xs text-on-secondary">الالتزام العام</p>
    </div>
  </div>

  <!-- Patient List -->
  <div class="bg-white rounded-2xl border border-outline-variant shadow-sm overflow-hidden">
    <div class="p-4 border-b border-outline-variant/30 flex items-center justify-between">
      <h3 class="font-bold text-on-background">سجل المرضى النشطين</h3>
      <div class="relative">
        <input
          type="text"
          [(ngModel)]="searchQuery"
          placeholder="بحث عن مريض..."
          class="h-9 pl-9 pr-3 rounded-lg border border-outline-variant text-sm outline-none focus:border-primary text-right"
        />
        <lucide-icon
          [img]="searchIcon"
          class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-outline"
        ></lucide-icon>
      </div>
    </div>
    <div class="divide-y divide-outline-variant/20">
      @for (p of filteredPatients; track p.id) {
        <div
          class="flex items-center gap-4 p-4 hover:bg-surface-container-low transition-colors text-right"
        >
          <div
            [class]="
              p.status === 'urgent'
                ? 'w-3 h-3 bg-danger rounded-full animate-pulse'
                : 'w-3 h-3 bg-emerald-500 rounded-full'
            "
          ></div>
          <div
            class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center text-primary font-bold"
          >
            {{ p.name[0] }}
          </div>
          <div class="flex-1">
            <p class="font-bold text-on-background text-sm">{{ p.name }}</p>
            <p class="text-xs text-outline">{{ p.statusText }}</p>
          </div>
          <div class="text-left">
            <p
              class="text-xs font-bold"
              [class]="p.adherence >= 90 ? 'text-emerald-600' : 'text-secondary'"
            >
              {{ p.adherence }}٪ التزام
            </p>
            <p class="text-[10px] text-outline">{{ p.lastDose }}</p>
          </div>
        </div>
      }
    </div>
  </div>

  <div class="flex justify-center">
    <button
      routerLink="/caregiver-review"
      class="bg-primary hover:bg-primary-dark text-white px-6 py-3 rounded-xl font-bold text-sm transition-all cursor-pointer"
    >
      مسح وصفة طبية جديدة (OCR)
    </button>
  </div>
</div>
