<section class="container-app space-y-6 pt-16 pb-24" style="max-width: 580px">
  <div class="text-center mb-4">
    <h2 class="text-2xl font-extrabold text-primary">بطاقة الأدوية الرقمية</h2>
    <p class="text-sm text-outline">بطاقة طبية إلكترونية آمنة لمشاركتها مع طبيبك</p>
  </div>

  <!-- Card -->

  <div>
    <app-card [cardData]="cardData" />
  </div>

  <!-- Actions -->
  <div class="flex flex-col sm:flex-row gap-3">
    <button
      (click)="printCard()"
      class="flex-1 bg-primary hover:bg-primary-dark text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all cursor-pointer"
    >
      <lucide-icon [img]="printerIcon" class="w-5 h-5"></lucide-icon>
      طباعة البطاقة
    </button>
    <button
      routerLink="/patient"
      class="flex-1 border border-outline-variant text-on-surface-variant hover:bg-slate-50 py-3 rounded-xl font-bold text-sm transition-all cursor-pointer"
    >
      العودة للرئيسية
    </button>
    <button
      (click)="generateQR()"
      class="flex-1 bg-primary hover:bg-primary-dark text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-all cursor-pointer"
    >
      إنشاء QR Code
    </button>
  </div>
</section>
