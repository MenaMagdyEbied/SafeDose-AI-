@if (!data) {
  <div class="container-app pt-16 pb-24 text-center">
    <p class="text-outline text-sm">الرجاء إجراء فحص التداخل أولاً لعرض النتائج.</p>
    <button
      (click)="router.navigate(['/interaction-checker'])"
      class="mt-4 bg-primary text-white px-6 py-2.5 rounded-xl text-sm font-bold"
    >
      اذهب للفحص
    </button>
  </div>
} @else {
  <div class="container-app pt-16 pb-24">
    <div class="max-w-2xl mx-auto space-y-4 sm:space-y-6">
      <!-- Severity Banner -->
      <div
        [class]="
          data.status === 'high'
            ? 'p-6 sm:p-8 text-center rounded-2xl sm:rounded-3xl bg-danger text-white animate-pulse'
            : 'p-6 sm:p-8 text-center rounded-2xl sm:rounded-3xl bg-secondary text-white'
        "
      >
        <div class="flex flex-col items-center gap-3 sm:gap-4">
          <lucide-icon
            [img]="alertTriangleIcon"
            class="w-14 h-14 sm:w-20 sm:h-20 text-white"
          ></lucide-icon>
          <h1 class="text-xl sm:text-3xl font-black tracking-tight leading-snug">
            {{ data.title }}
          </h1>
        </div>
      </div>

      <!-- Explanation -->
      <div
        class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-outline-variant space-y-4 text-right"
      >
        <h2
          class="text-lg sm:text-xl font-bold"
          [class]="data.status === 'high' ? 'text-danger' : 'text-secondary'"
        >
          {{ data.severityText }}
        </h2>
        <p class="text-on-surface-variant text-sm sm:text-base leading-relaxed">
          {{ data.explanation }}
        </p>

        <a
          href="tel:123"
          class="inline-flex items-center gap-2 bg-primary/10 text-primary px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl font-bold text-sm hover:bg-primary/20 transition-all"
        >
          <lucide-icon [img]="phoneIcon" class="w-4 h-4 sm:w-5 sm:h-5"></lucide-icon>
          اتصل بطبيبك فوراً
        </a>
      </div>

      <!-- Checked Medications -->
      <div
        class="bg-white p-5 sm:p-6 rounded-2xl shadow-sm border border-outline-variant space-y-3 text-right"
      >
        <h3 class="text-base sm:text-lg font-bold text-on-background">الأدوية المفحوصة</h3>
        @for (med of data.checkedMeds; track med.name) {
          <div
            class="flex items-center gap-3 sm:gap-4 p-3 rounded-xl"
            [class]="
              med.severity === 'error'
                ? 'bg-danger-container'
                : med.severity === 'warning'
                  ? 'bg-secondary-container/50'
                  : 'bg-emerald-50'
            "
          >
            <lucide-icon
              [img]="pillIcon"
              [class]="
                med.severity === 'error'
                  ? 'w-6 h-6 sm:w-8 sm:h-8 text-danger shrink-0'
                  : med.severity === 'warning'
                    ? 'w-6 h-6 sm:w-8 sm:h-8 text-secondary shrink-0'
                    : 'w-6 h-6 sm:w-8 sm:h-8 text-emerald-600 shrink-0'
              "
            ></lucide-icon>
            <div class="flex-1 min-w-0">
              <p class="font-bold text-on-background text-sm sm:text-base truncate">
                {{ med.name }}
              </p>
              <p class="text-xs text-outline">{{ med.dose }}</p>
            </div>
          </div>
        }
      </div>

      <!-- Source -->
      <div class="text-center text-xs text-outline">المصدر: {{ data.source }}</div>

      <!-- Actions -->
      <div class="flex flex-col sm:flex-row justify-center gap-3 pt-2">
        <button
          routerLink="/interaction-checker"
          class="w-full sm:w-auto bg-primary hover:bg-primary-dark text-white px-6 py-3 rounded-xl font-bold text-sm transition-all cursor-pointer"
        >
          فحص أدوية أخرى
        </button>
        <button
          routerLink="/patient"
          class="w-full sm:w-auto border border-outline-variant text-on-surface-variant hover:bg-slate-50 px-6 py-3 rounded-xl font-bold text-sm transition-all cursor-pointer"
        >
          العودة للرئيسية
        </button>
      </div>
    </div>
  </div>
}
