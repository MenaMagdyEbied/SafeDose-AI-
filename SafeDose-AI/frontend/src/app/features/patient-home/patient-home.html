<section class="space-y-6 container-app pt-16 pb-24">
  <!-- Interaction Checker Button -->
  @if (successText()) {
    <div
      class="bg-emerald-50 text-emerald-800 p-4 rounded-xl flex items-center gap-2 border border-emerald-200"
    >
      <lucide-icon [img]="checkCircleIcon" class="w-5 h-5 shrink-0"></lucide-icon>
      <p class="text-sm font-bold">{{ successText() }}</p>
    </div>
  }
  <section>
    <button
      routerLink="/interaction-checker"
      class="w-full cursor-pointer bg-primary hover:bg-primary-dark text-white rounded-3xl p-5 sm:p-6 shadow-md flex items-center justify-between text-right active:scale-99 transition-all group border border-primary-light/30 gap-4"
    >
      <div class="space-y-2">
        <h2 class="text-lg sm:text-2xl font-bold">فحص التداخلات الدوائية</h2>
        <p class="text-xs text-white/80">تأكد من سلامة أدويتك في ثوانٍ معدودة</p>
      </div>
      <div
        class="bg-tertiary-container text-tertiary p-3 sm:p-4 rounded-2xl group-hover:scale-105 transition-transform shrink-0"
      >
        <lucide-icon [img]="pillIcon" class="w-8 h-8 sm:w-10 sm:h-10"></lucide-icon>
      </div>
    </button>
  </section>

  <!-- Next Dose -->
  <section class="space-y-3">
    <h3 class="text-lg font-bold text-on-surface-variant">الموعد القادم</h3>
    <div
      class="bg-surface-container-low border border-outline-variant/30 rounded-2xl p-4 sm:p-5 flex flex-col gap-4"
    >
      <div class="flex items-center gap-3 sm:gap-4">
        <div class="w-2 h-14 sm:h-16 bg-primary rounded-full shrink-0"></div>
        <div class="flex-1 text-right">
          <h4 class="text-base sm:text-xl font-bold text-primary">جلوكوفاج (Glucophage 500mg)</h4>
          <p class="text-xs sm:text-sm text-on-surface-variant leading-relaxed">
            10:00 صباحاً - بعد الإفطار مباشرةً
          </p>
        </div>
        <lucide-icon
          [img]="activityIcon"
          class="w-6 h-6 sm:w-8 sm:h-8 text-primary shrink-0"
        ></lucide-icon>
      </div>
      <button
        (click)="takeDose()"
        [disabled]="taken()"
        [class]="
          taken()
            ? 'w-full h-14 rounded-xl font-bold text-base sm:text-lg flex items-center justify-center gap-2 transition-all bg-slate-200 text-outline cursor-not-allowed'
            : 'w-full h-14 rounded-xl font-bold text-base sm:text-lg flex items-center justify-center gap-2 transition-all bg-tertiary hover:bg-tertiary-dark text-white shadow-sm cursor-pointer'
        "
      >
        <span>{{ taken() ? 'تم تناول الجرعة بنجاح' : 'تناول الجرعة الآن' }}</span>
        <lucide-icon
          [img]="checkCircleIcon"
          [class]="taken() ? 'w-5 h-5 text-emerald-600' : 'w-5 h-5 text-white'"
        ></lucide-icon>
      </button>
    </div>
  </section>

  <!-- Quick Actions -->
  <section class="space-y-2">
    <h3 class="text-md font-bold text-outline">اختصارات سريعة</h3>
    <div class="grid grid-cols-4 gap-2 sm:gap-3">
      <button
        routerLink="/scan-prescription"
        class="flex flex-col items-center justify-center gap-2 bg-white border border-outline-variant/30 rounded-2xl p-3 sm:p-4 min-h-25 hover:bg-slate-50 transition-colors cursor-pointer"
      >
        <lucide-icon [img]="cameraIcon" class="w-7 h-7 sm:w-8 sm:h-8 text-primary"></lucide-icon>
        <span class="text-[11px] sm:text-xs font-bold text-on-background text-center"
          >مسح وصفة</span
        >
      </button>
      <button
        (click)="openEditModal()"
        class="flex flex-col items-center justify-center gap-2 bg-white border border-outline-variant/30 rounded-2xl p-3 sm:p-4 min-h-25 hover:bg-slate-50 transition-colors cursor-pointer"
      >
        <lucide-icon [img]="plusIcon" class="w-7 h-7 sm:w-8 sm:h-8 text-primary"></lucide-icon>
        <span class="text-[11px] sm:text-xs font-bold text-on-background text-center">
          إضافة دواء
        </span>
      </button>

      <button
        routerLink="/prescriptions"
        class="flex flex-col items-center justify-center gap-2 bg-white border border-outline-variant/30 rounded-2xl p-3 sm:p-4 min-h-25 hover:bg-slate-50 transition-colors cursor-pointer"
      >
        <lucide-icon [img]="pillIcon" class="w-7 h-7 sm:w-8 sm:h-8 text-primary"></lucide-icon>
        <span class="text-[11px] sm:text-xs font-bold text-on-background text-center"
          >الوصفات الطبية</span
        >
      </button>

      <button
        routerLink="/digital-card"
        class="flex flex-col items-center justify-center gap-2 bg-white border border-outline-variant/30 rounded-2xl p-3 sm:p-4 min-h-25 hover:bg-slate-50 transition-colors cursor-pointer"
      >
        <lucide-icon [img]="qrCodeIcon" class="w-7 h-7 sm:w-8 sm:h-8 text-primary"></lucide-icon>
        <span class="text-[11px] sm:text-xs font-bold text-on-background text-center"
          >كرت العلاج</span
        >
      </button>
    </div>
  </section>

        >
      </div>

  <!-- Upgrade Banner (Free users only) -->
  @if (user.subscriptionPlan === 'free') {
    <div
      class="bg-linear-to-r from-secondary to-secondary-dark p-5 rounded-2xl text-right text-white flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-4 shadow-md"
    >
      <div class="space-y-1">
        <h4 class="font-bold text-md">طوّر حسابك للباقة العائلية</h4>
        <p class="text-xs text-white/80">أضف حتى ٥ أفراد من عائلتك وتتبع أدويتهم</p>
      </div>
      <button
        (click)="router.navigate(['/pricing'])"
        class="bg-white cursor-pointer text-secondary font-bold px-4 py-2 rounded-xl text-xs shrink-0 hover:bg-white/90 transition-all"
      >
        ترقية ⭐
      </button>
    </div>
  }
</section>

<!-- Edit Modal -->
@if (showEditModal()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 overflow-hidden"
    dir="rtl"
    (click)="closeEditModal()"
  >
    <div
      class="bg-white rounded-3xl shadow-xl w-full max-w-3xl max-h-[88vh] flex flex-col overflow-hidden"
      (click)="$event.stopPropagation()"
    >
      <div
        class="flex items-center justify-between px-4 pt-3 pb-2 border-b border-outline-variant/30 shrink-0"
      >
        <h3 class="font-extrabold text-on-background text-lg">إضافة دواء جديد</h3>
        <button
          (click)="closeEditModal()"
          class="w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center cursor-pointer"
        >
          <lucide-icon [img]="xIcon" class="w-5 h-5 text-outline"></lucide-icon>
        </button>
      </div>
      <div class="overflow-y-auto p-2 sm:p-3">
        <app-add-medication
          (saved)="onMedicationSaved()"
          (cancelled)="onMedicationCancelled()"
        ></app-add-medication>
      </div>
    </div>
  </div>
}
