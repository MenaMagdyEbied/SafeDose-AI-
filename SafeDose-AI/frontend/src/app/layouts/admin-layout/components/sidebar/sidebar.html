<!-- Desktop Sidebar -->
<aside
  class="hidden lg:flex min-h-screen sticky top-0 w-64 bg-primary text-white flex-col shrink-0"
>
  <div
    class="p-6 flex items-center gap-2.5 cursor-pointer border-b border-white/10"
    routerLink="/admin"
  >
    <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-md">
      <lucide-icon [img]="heartIcon" class="w-5 h-5 text-primary animate-pulse"></lucide-icon>
    </div>
    <div class="text-right">
      <span class="font-sans font-black text-lg tracking-tight text-white block">SafeDose AI</span>
      <p class="text-xs text-white/60 mt-1">لوحة التحكم الأدمن</p>
    </div>
  </div>
  <nav class="flex-1 p-4 space-y-1">
    <a
      routerLink="/admin"
      routerLinkActive="bg-white/30"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold hover:bg-white/10 transition-all"
    >
      <lucide-icon [img]="layoutDashboardIcon" class="w-4 h-4"></lucide-icon>
      لوحة التحكم
    </a>
    <a
      routerLink="/admin/pricing"
      routerLinkActive="bg-white/30"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold hover:bg-white/10 transition-all"
    >
      <lucide-icon [img]="settingsIcon" class="w-4 h-4"></lucide-icon>
      تعديل الباقات
    </a>
    <a
      routerLink="/admin/managers"
      routerLinkActive="bg-white/30"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold hover:bg-white/10 transition-all"
    >
      <lucide-icon [img]="usersIcon" class="w-4 h-4"></lucide-icon>
      إدارة المشرفين
    </a>
  </nav>
  <div class="p-4 border-t">
    <div class="relative">
      <button
        (click)="showLogoutConfirm = true; accountMenu = false"
        class="flex gap-1 items-center cursor-pointer font-bold"
      >
        <lucide-icon [img]="logOutIcon" class="w-5 h-5 font-extrabold text-danger"></lucide-icon>
        تسجيل خروج
        <span class="hidden sm:inline">{{ userName || 'حسابي' }}</span>
      </button>
    </div>
  </div>
</aside>

<!-- Mobile Top Bar -->
<div
  class="lg:hidden fixed top-0 inset-x-0 z-40 bg-primary text-white px-4 h-14 flex items-center justify-between"
>
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center">
      <lucide-icon [img]="heartIcon" class="w-4 h-4 text-primary"></lucide-icon>
    </div>
    <span class="font-black text-sm">SafeDose AI Admin</span>
  </div>
  <button
    (click)="mobileMenu = !mobileMenu"
    class="w-9 h-9 rounded-xl hover:bg-white/10 flex items-center justify-center cursor-pointer"
  >
    <lucide-icon [img]="menuIcon" class="w-5 h-5"></lucide-icon>
  </button>
</div>

<!-- Mobile Drawer -->
@if (mobileMenu) {
  <div class="lg:hidden fixed inset-0 z-50 flex" dir="rtl">
    <div class="fixed inset-0 bg-black/50" (click)="mobileMenu = false"></div>
    <div class="relative w-64 bg-primary text-white flex flex-col min-h-screen">
      <div class="p-5 flex items-center justify-between border-b border-white/10">
        <span class="font-black text-base">SafeDose AI Admin</span>
        <button
          (click)="mobileMenu = false"
          class="w-8 h-8 rounded-xl hover:bg-white/10 flex items-center justify-center cursor-pointer"
        >
          <lucide-icon [img]="xIcon" class="w-4 h-4"></lucide-icon>
        </button>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <a
          routerLink="/admin"
          (click)="mobileMenu = false"
          routerLinkActive="bg-white/30"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold hover:bg-white/10 transition-all"
        >
          <lucide-icon [img]="layoutDashboardIcon" class="w-4 h-4"></lucide-icon>
          لوحة التحكم
        </a>
        <a
          routerLink="/admin/pricing"
          (click)="mobileMenu = false"
          routerLinkActive="bg-white/30"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold hover:bg-white/10 transition-all"
        >
          <lucide-icon [img]="settingsIcon" class="w-4 h-4"></lucide-icon>
          تعديل الباقات
        </a>
        <a
          routerLink="/admin/managers"
          (click)="mobileMenu = false"
          routerLinkActive="bg-white/30"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold hover:bg-white/10 transition-all"
        >
          <lucide-icon [img]="usersIcon" class="w-4 h-4"></lucide-icon>
          إدارة المشرفين
        </a>
      </nav>
      <div class="p-4 border-t border-white/10">
        <p class="text-xs text-white/50">Admin Panel v1.0</p>
      </div>
    </div>
  </div>
}
<!-- Logout Confirm Modal -->
@if (showLogoutConfirm) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-neutral-dark/60 backdrop-blur-xs text-right animate-fade-in"
    dir="rtl"
  >
    <div
      class="w-full max-w-sm bg-white border border-outline-variant rounded-3xl p-6 shadow-2xl space-y-5"
    >
      <div
        class="mx-auto w-12 h-12 bg-red-50 text-danger rounded-full flex items-center justify-center"
      >
        <lucide-icon [img]="logOutIcon" class="w-6 h-6 animate-pulse"></lucide-icon>
      </div>
      <div class="space-y-2 text-center">
        <h3 class="text-lg font-black text-on-background">هل أنت متأكد من تسجيل الخروج؟</h3>
        <p class="text-xs text-outline leading-relaxed">
          ستفقد جلسة الأمان ومزامنة الأدوية الحالية.
        </p>
      </div>
      <div class="grid grid-cols-2 gap-3 pt-2">
        <button
          (click)="logout()"
          class="w-full bg-danger cursor-pointer hover:bg-red-700 text-white font-bold py-3 rounded-xl text-xs shadow-md transition-all min-h-11"
        >
          تأكيد الخروج
        </button>
        <button
          (click)="showLogoutConfirm = false"
          class="w-full bg-slate-100 cursor-pointer hover:bg-slate-200 text-on-surface-variant font-bold py-3 rounded-xl text-xs transition-all min-h-11"
        >
          إلغاء
        </button>
      </div>
    </div>
  </div>
}
