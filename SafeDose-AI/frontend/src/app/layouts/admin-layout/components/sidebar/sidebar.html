
<aside class="min-h-screen w-64 bg-primary text-white flex flex-col shrink-0">
  <div class="p-6 border-b border-white/10">
    <h1 class="font-black text-xl">SafeDose Admin</h1>
    <p class="text-xs text-white/60 mt-1">لوحة التحكم</p>
  </div>
  <nav class="flex-1 p-4 space-y-1">
    <a
      routerLink="/admin"
      routerLinkActive="bg-white/30"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold hover:bg-white/10 transition-all"
    >
      <lucide-icon [img]="layoutDashboardIcon" class="w-4 h-4"></lucide-icon>
      لوحة التحكم
    </a>

    <a
      routerLink="/admin/pricing"
      routerLinkActive="bg-white/30"
      class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold hover:bg-white/10 transition-all"
    >
      <lucide-icon [img]="settingsIcon" class="w-4 h-4"></lucide-icon>
      تعديل الباقات
    </a>
  </nav>

  <div class="p-4 border-t border-white/10">
    <p class="text-xs text-white/50">Admin Panel v1.0</p>
  </div>
</aside>
