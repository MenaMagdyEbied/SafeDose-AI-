<header class="sticky top-0 z-40 bg-white border-b border-outline-variant/50 shadow-xs">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
    <!-- Logo -->
    <div class="flex items-center gap-2.5 cursor-pointer" routerLink="/home">
      <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-md">
        <lucide-icon [img]="heartIcon" class="w-5 h-5 text-white animate-pulse"></lucide-icon>
      </div>
      <div class="text-right">
        <span class="font-sans font-black text-lg tracking-tight text-primary block"
          >SafeDose AI</span
        >
        <span class="text-[10px] text-outline font-sans block leading-none"
          >أمانك الدوائي، خطوة بخطوة</span
        >
      </div>
    </div>

    <!-- Nav -->
    <nav class="hidden md:flex items-center gap-5 text-xs font-bold text-on-surface-variant">
      <a
        routerLink="/home"
        class="flex gap-1 items-center"
        routerLinkActive="text-primary"
        [class]="currentRoute === '/home' ? 'text-primary' : 'hover:text-primary'"
        ><lucide-icon name="activity" [size]="20"></lucide-icon>
        الرئيسية
      </a>
      <a
        routerLink="/caregiver"
        class="flex gap-1 items-center"
        routerLinkActive="text-primary"
        [class]="currentRoute === '/caregiver' ? 'text-primary' : 'hover:text-primary'"
      >
        <lucide-icon name="shield" [size]="20"></lucide-icon> SafeDose Pro
      </a>
      <a
        routerLink="/patient"
        class="flex gap-1 items-center"
        routerLinkActive="text-primary"
        [class]="currentRoute === '/patient' ? 'text-primary' : 'hover:text-primary'"
      >
        <lucide-icon name="heart" [size]="20"></lucide-icon> بوابة المريض
      </a>
      <a
        routerLink="/pricing"
        class="flex gap-1 items-center"
        [class]="currentRoute === '/pricing' ? 'text-primary' : 'hover:text-primary'"
      >
        <lucide-icon name="pill" [size]="20"></lucide-icon> الأسعار
      </a>
    </nav>
    <div class="flex items-center gap-1 sm:gap-3">
      <!-- Logout -->
      <!-- @if (auth.isLoggedIn) {
            <button (click)="showLogoutConfirm = true"
              class="flex items-center gap-1.5 px-3 py-1.5 bg-red-50 text-danger hover:bg-red-100 border border-danger/20 hover:border-danger/30 rounded-xl text-xs font-bold transition-all min-h-[44px]">
              <lucide-icon [img]="logOutIcon" class="w-3.5 h-3.5"></lucide-icon>
              <span class="hidden sm:inline">تسجيل الخروج ({{ (auth.user?.name || '').split(' ')[0] }})</span>
            </button>
          } -->

      @if (true) {
        <button
          (click)="showLogoutConfirm = true"
          class="flex items-center gap-1.5 cursor-pointer px-3 py-1.5 bg-red-50 text-danger hover:bg-red-100 border border-danger/20 hover:border-danger/30 rounded-xl text-xs font-bold transition-all min-h-[44px]"
        >
          <!-- <span class="hidden sm:inline">تسجيل خروج دعاء ({{ (auth.user?.name || '').split(' ')[0] }})</span> -->
          <span class="hidden sm:inline"> تسجيل خروج دعاء</span>
          <lucide-icon [img]="logOutIcon" class="w-3.5 h-3.5"></lucide-icon>
        </button>
      }
    </div>
  </div>
</header>

<!-- Toast -->
@if (toastMessage) {
  <div
    class="fixed top-20 left-1/2 -translate-x-1/2 z-50 max-w-sm bg-neutral-dark border border-neutral text-white font-bold py-3 px-5 rounded-2xl shadow-xl text-right text-xs flex items-center gap-2.5 animate-slide-in-top"
  >
    <lucide-icon [img]="userCheckIcon" class="w-5 h-5 text-emerald-400 shrink-0"></lucide-icon>
    <p>{{ toastMessage }}</p>
  </div>
}

<!-- Logout Modal -->
@if (showLogoutConfirm) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-neutral-dark/60 backdrop-blur-xs text-right animate-fade-in"
    dir="rtl"
  >
    <div
      class="w-full max-w-sm bg-white border border-outline-variant rounded-3xl p-6 shadow-2xl space-y-5"
    >
      <div
        class="mx-auto w-12 h-12 bg-red-50 text-danger rounded-full flex items-center justify-center"
      >
        <lucide-icon [img]="logOutIcon" class="w-6 h-6 animate-pulse"></lucide-icon>
      </div>
      <div class="space-y-2 text-center">
        <h3 class="text-lg font-black text-on-background">هل أنت متأكد من تسجيل الخروج؟</h3>
        <p class="text-xs text-outline leading-relaxed">
          ستفقد جلسة الأمان ومزامنة الأدوية الحالية.
        </p>
      </div>
      <div class="grid grid-cols-2 gap-3 pt-2">
        <button
          (click)="logout()"
          class="w-full bg-danger cursor-pointer hover:bg-red-700 text-white font-bold py-3 rounded-xl text-xs shadow-md transition-all min-h-[44px]"
        >
          تأكيد الخروج
        </button>
        <button
          (click)="showLogoutConfirm = false"
          class="w-full bg-slate-100 cursor-pointer hover:bg-slate-200 text-on-surface-variant font-bold py-3 rounded-xl text-xs transition-all min-h-[44px]"
        >
          إلغاء
        </button>
      </div>
    </div>
  </div>
}
