@if (isOpen) {
  <div
    class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 animate-fade-in"
    (click)="onCancel()"
  >
    <div
      class="bg-white rounded-3xl shadow-xl w-full max-w-sm p-6 space-y-5"
      (click)="$event.stopPropagation()"
    >
      <!-- Icon -->
      <div class="mx-auto w-12 h-12 rounded-full flex items-center justify-center" [class]="iconBg">
        <lucide-icon
          [img]="trashIcon"
          class="w-6 h-6 animate-pulse"
          [class]="iconColor"
        ></lucide-icon>
      </div>

      <!-- Text -->
      <div class="text-center space-y-1">
        <h3 class="text-base font-extrabold text-on-background">{{ title }}</h3>
        <p class="text-xs text-outline leading-relaxed">{{ message }}</p>
      </div>

      <!-- Buttons -->
      <div class="grid grid-cols-2 gap-3">
        <button
          (click)="onConfirm()"
          class="h-11 font-bold text-sm rounded-2xl transition-all cursor-pointer text-white"
          [class]="confirmBg"
        >
          {{ confirmText }}
        </button>
        <button
          (click)="onCancel()"
          class="h-11 bg-surface-container-high hover:bg-surface-container-highest text-on-background font-bold text-sm rounded-2xl transition-all cursor-pointer"
        >
          {{ cancelText }}
        </button>
      </div>
    </div>
  </div>
}
